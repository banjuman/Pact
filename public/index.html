<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pact - Virtual Office</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e;
  color: #fff;
  overflow: hidden;
  height: 100vh;
  display: flex;
}

/* ── Entry Screen ── */
#entry-screen {
  position: fixed; inset: 0; z-index: 100;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  display: flex; align-items: center; justify-content: center;
}
.entry-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 44px 36px;
  text-align: center;
  width: 480px;
  max-width: 95vw;
}
.entry-card h1 {
  font-size: 48px; font-weight: 800;
  background: linear-gradient(135deg, #e2b714, #f093fb, #4facfe);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.entry-card .subtitle { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 28px; }
#name-input {
  width: 100%; padding: 14px 18px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
  color: #fff; font-size: 16px; outline: none; transition: border-color 0.2s; margin-bottom: 20px;
}
#name-input:focus { border-color: rgba(255,255,255,0.4); }
#name-input::placeholder { color: rgba(255,255,255,0.3); }
.char-label { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 10px; text-align: left; }
#character-select {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 24px; max-width: 420px; margin-left: auto; margin-right: auto;
}
.char-preview {
  width: 52px; height: 64px; border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.1); cursor: pointer;
  transition: all 0.2s; background: rgba(255,255,255,0.04);
}
.char-preview:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
.char-preview.selected {
  border-color: #e2b714; box-shadow: 0 0 14px rgba(226,183,20,0.3); transform: translateY(-2px);
}
#join-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #e2b714, #f5c842);
  color: #1a1a2e; font-size: 16px; font-weight: 700; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
#join-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(226,183,20,0.4); }

/* ── Game Layout ── */
#game-area { flex: 1; position: relative; display: none; cursor: pointer; }
#game-canvas { display: block; width: 100%; height: 100%; background: #2a2a3e; }

/* ── Chat Panel ── */
#chat-panel {
  width: 300px; background: rgba(15,15,30,0.95);
  border-left: 1px solid rgba(255,255,255,0.08); display: none; flex-direction: column;
}
#chat-header { padding: 16px 18px; font-weight: 700; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
#chat-messages { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.chat-msg { font-size: 13px; line-height: 1.4; color: rgba(255,255,255,0.85); word-break: break-word; }
.chat-msg .chat-name { font-weight: 700; color: #e2b714; }
.chat-msg.system { color: rgba(255,255,255,0.35); font-style: italic; font-size: 12px; }
#chat-input-area { padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.08); }
#chat-input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06);
  color: #fff; font-size: 13px; outline: none;
}
#chat-input:focus { border-color: rgba(255,255,255,0.25); }
#chat-input::placeholder { color: rgba(255,255,255,0.25); }

/* ── Emoji Bar ── */
#emoji-bar {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; background: rgba(15,15,30,0.85); backdrop-filter: blur(10px);
  padding: 8px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
}
.emoji-btn {
  width: 40px; height: 40px; border: none; background: rgba(255,255,255,0.06);
  border-radius: 10px; font-size: 20px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.emoji-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.15); }
.emoji-btn:active { transform: scale(0.95); }
.emoji-btn.emoji-active {
  background: rgba(226,183,20,0.3); box-shadow: 0 0 10px rgba(226,183,20,0.4);
  transform: scale(1.1);
}
#throw-divider { width: 1px; background: rgba(255,255,255,0.15); margin: 4px 2px; }
.emoji-btn.throw-active { background: rgba(226,183,20,0.3); box-shadow: 0 0 8px rgba(226,183,20,0.4); }
.emoji-btn.throw-disabled { opacity: 0.3; cursor: default; }
.emoji-btn.throw-disabled:hover { background: rgba(255,255,255,0.06); transform: none; }

/* ── HUD ── */
#hud {
  position: absolute; top: 16px; left: 16px;
  background: rgba(15,15,30,0.8); backdrop-filter: blur(10px);
  padding: 12px 18px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08);
  font-size: 13px; display: flex; gap: 14px; align-items: center;
}
#hud .player-count { color: rgba(255,255,255,0.6); font-weight: 500; }

/* ── Overlay ── */
#overlay {
  position: fixed; inset: 0; z-index: 90; background: rgba(10,10,20,0.85);
  display: none; align-items: center; justify-content: center;
  font-size: 18px; color: rgba(255,255,255,0.6);
}
</style>
</head>
<body>

<div id="entry-screen">
  <div class="entry-card">
    <h1>Pact</h1>
    <p class="subtitle">Virtual Office</p>
    <input id="name-input" type="text" placeholder="Enter your name" maxlength="20" autocomplete="off" />
    <p class="char-label">Choose your character</p>
    <div id="character-select"></div>
    <button id="join-btn">Join Office</button>
  </div>
</div>

<div id="game-area">
  <canvas id="game-canvas"></canvas>
  <div id="hud">
    <span class="player-count" id="hud-players"></span>
  </div>
  <div id="emoji-bar">
    <button class="emoji-btn" data-emoji="😀">😀</button>
    <button class="emoji-btn" data-emoji="🔥">🔥</button>
    <button class="emoji-btn" data-emoji="❤️">❤️</button>
    <button class="emoji-btn" data-emoji="😢">😢</button>
    <button class="emoji-btn" data-emoji="⚡">⚡</button>
    <div id="throw-divider"></div>
    <button class="emoji-btn throw-disabled" id="throw-btn" title="Throw! (T)">🤾</button>
  </div>
</div>

<div id="chat-panel">
  <div id="chat-header">Chat</div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <input id="chat-input" type="text" placeholder="Type a message... (Enter)" maxlength="500" autocomplete="off" />
  </div>
</div>

<div id="overlay"><span id="overlay-text">Connecting...</span></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════
//  CHARACTERS (10 diverse)
// ═══════════════════════════════════════════
const CHARACTERS = [
  { name: "Alex",    skin: "#f4c794", body: "#4a90d9", hair: "#3a2a1a", hairStyle: "short",    accessory: "none" },
  { name: "Jordan",  skin: "#8d5524", body: "#e74c3c", hair: "#1a1a1a", hairStyle: "curly",    accessory: "glasses" },
  { name: "Sam",     skin: "#ffe0bd", body: "#2ecc71", hair: "#c2883a", hairStyle: "long",     accessory: "headphones" },
  { name: "Riley",   skin: "#c68642", body: "#f39c12", hair: "#1a1a1a", hairStyle: "ponytail", accessory: "bow" },
  { name: "Casey",   skin: "#f4c794", body: "#9b59b6", hair: "#e74c3c", hairStyle: "spiky",    accessory: "hat" },
  { name: "Morgan",  skin: "#d4a574", body: "#e91e63", hair: "#8B4513", hairStyle: "bob",      accessory: "earrings" },
  { name: "Taylor",  skin: "#6b4226", body: "#00bcd4", hair: "#1a1a1a", hairStyle: "afro",     accessory: "bandana" },
  { name: "Drew",    skin: "#ffe0bd", body: "#ff5722", hair: "#333",    hairStyle: "buzz",     accessory: "scarf" },
  { name: "Quinn",   skin: "#f4c794", body: "#607d8b", hair: "#c0c0c0", hairStyle: "wavy",     accessory: "none" },
  { name: "Avery",   skin: "#8d5524", body: "#1a237e", hair: "#1a1a1a", hairStyle: "braids",   accessory: "beanie" },
];

function drawCharacter(ctx, x, y, charIdx, direction, name, isSelf, bobOffset) {
  const ch = CHARACTERS[charIdx] || CHARACTERS[0];
  const cx = Math.round(x);
  const cy = Math.round(y + (bobOffset || 0));
  ctx.save();

  // Shadow
  ctx.fillStyle = "rgba(0,0,0,0.18)";
  ctx.beginPath();
  ctx.ellipse(cx, cy + 28, 11, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.fillStyle = "#3a3a5a";
  ctx.fillRect(cx - 6, cy + 14, 5, 14);
  ctx.fillRect(cx + 1, cy + 14, 5, 14);
  ctx.fillStyle = "#2a2a3a";
  ctx.fillRect(cx - 7, cy + 25, 6, 3);
  ctx.fillRect(cx + 1, cy + 25, 6, 3);

  // Body
  ctx.fillStyle = ch.body;
  ctx.fillRect(cx - 9, cy + 2, 18, 14);
  ctx.fillStyle = "rgba(0,0,0,0.1)";
  ctx.fillRect(cx - 9, cy + 12, 18, 4);

  // Arms
  ctx.fillStyle = ch.body;
  ctx.fillRect(cx - 13, cy + 4, 5, 10);
  ctx.fillRect(cx + 9, cy + 4, 5, 10);
  ctx.fillStyle = ch.skin;
  ctx.fillRect(cx - 13, cy + 12, 5, 3);
  ctx.fillRect(cx + 9, cy + 12, 5, 3);

  // Head
  ctx.fillStyle = ch.skin;
  ctx.beginPath();
  ctx.arc(cx, cy - 4, 10, 0, Math.PI * 2);
  ctx.fill();

  drawHair(ctx, cx, cy, ch.hair, ch.hairStyle, direction);

  // Face
  ctx.fillStyle = "#222";
  if (direction === "down") {
    ctx.fillRect(cx - 4, cy - 4, 2, 3);
    ctx.fillRect(cx + 2, cy - 4, 2, 3);
    ctx.fillStyle = "#c0755a";
    ctx.fillRect(cx - 1, cy + 1, 3, 1);
  } else if (direction === "left") {
    ctx.fillRect(cx - 5, cy - 4, 2, 3);
    ctx.fillStyle = "#c0755a";
    ctx.fillRect(cx - 3, cy + 1, 2, 1);
  } else if (direction === "right") {
    ctx.fillRect(cx + 3, cy - 4, 2, 3);
    ctx.fillStyle = "#c0755a";
    ctx.fillRect(cx + 1, cy + 1, 2, 1);
  }

  drawAccessory(ctx, cx, cy, ch.accessory, direction);

  // Name
  ctx.font = "bold 10px 'Segoe UI', system-ui, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "bottom";
  ctx.strokeStyle = "rgba(0,0,0,0.6)";
  ctx.lineWidth = 3;
  ctx.lineJoin = "round";
  ctx.strokeText(name, cx, cy - 18);
  ctx.fillStyle = isSelf ? "#FFD700" : "#fff";
  ctx.fillText(name, cx, cy - 18);

  ctx.restore();
}

function drawHair(ctx, cx, cy, color, style, dir) {
  ctx.fillStyle = color;
  switch (style) {
    case "short":
      ctx.beginPath(); ctx.arc(cx, cy - 7, 10, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - 10, cy - 8, 20, 4);
      break;
    case "curly":
      for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.arc(cx + i * 5, cy - 12, 5, 0, Math.PI * 2); ctx.fill(); }
      ctx.fillRect(cx - 10, cy - 10, 20, 5);
      break;
    case "long":
      ctx.beginPath(); ctx.arc(cx, cy - 7, 10, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - 10, cy - 8, 20, 4);
      if (dir !== "right") ctx.fillRect(cx - 12, cy - 6, 5, 16);
      if (dir !== "left") ctx.fillRect(cx + 7, cy - 6, 5, 16);
      break;
    case "ponytail":
      ctx.beginPath(); ctx.arc(cx, cy - 7, 10, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - 10, cy - 8, 20, 4);
      ctx.beginPath(); ctx.arc(cx, cy - 17, 5, 0, Math.PI * 2); ctx.fill();
      break;
    case "spiky":
      ctx.fillRect(cx - 10, cy - 8, 20, 5);
      ctx.beginPath(); ctx.moveTo(cx - 10, cy - 8); ctx.lineTo(cx - 6, cy - 18); ctx.lineTo(cx - 2, cy - 8); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 3, cy - 8); ctx.lineTo(cx + 1, cy - 20); ctx.lineTo(cx + 5, cy - 8); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + 3, cy - 8); ctx.lineTo(cx + 8, cy - 16); ctx.lineTo(cx + 11, cy - 8); ctx.fill();
      break;
    case "bob":
      ctx.beginPath(); ctx.arc(cx, cy - 6, 11, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - 11, cy - 7, 22, 5);
      ctx.fillRect(cx - 11, cy - 4, 4, 8);
      ctx.fillRect(cx + 7, cy - 4, 4, 8);
      break;
    case "afro":
      ctx.beginPath(); ctx.arc(cx, cy - 8, 14, 0, Math.PI * 2); ctx.fill();
      break;
    case "buzz":
      ctx.beginPath(); ctx.arc(cx, cy - 6, 10.5, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - 10, cy - 7, 20, 3);
      break;
    case "wavy":
      ctx.beginPath(); ctx.arc(cx, cy - 7, 10, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - 10, cy - 8, 20, 4);
      for (let i = 0; i < 3; i++) {
        const offset = Math.sin(i * 1.2) * 2;
        if (dir !== "right") ctx.fillRect(cx - 12 + offset, cy - 4 + i * 5, 5, 5);
        if (dir !== "left") ctx.fillRect(cx + 7 - offset, cy - 4 + i * 5, 5, 5);
      }
      break;
    case "braids":
      ctx.beginPath(); ctx.arc(cx, cy - 7, 10, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - 10, cy - 8, 20, 4);
      if (dir !== "right") { ctx.fillRect(cx - 11, cy - 4, 3, 18); ctx.beginPath(); ctx.arc(cx - 9.5, cy + 14, 2, 0, Math.PI * 2); ctx.fill(); }
      if (dir !== "left") { ctx.fillRect(cx + 8, cy - 4, 3, 18); ctx.beginPath(); ctx.arc(cx + 9.5, cy + 14, 2, 0, Math.PI * 2); ctx.fill(); }
      break;
  }
}

function drawAccessory(ctx, cx, cy, acc, dir) {
  switch (acc) {
    case "glasses":
      if (dir === "up") break;
      ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 1.5;
      if (dir === "down") {
        ctx.strokeRect(cx - 6, cy - 6, 5, 4); ctx.strokeRect(cx + 1, cy - 6, 5, 4);
        ctx.beginPath(); ctx.moveTo(cx - 1, cy - 4); ctx.lineTo(cx + 1, cy - 4); ctx.stroke();
      } else if (dir === "left") { ctx.strokeRect(cx - 7, cy - 6, 5, 4); }
      else if (dir === "right") { ctx.strokeRect(cx + 2, cy - 6, 5, 4); }
      break;
    case "headphones":
      ctx.strokeStyle = "#555"; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(cx, cy - 8, 11, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
      ctx.fillStyle = "#333"; ctx.fillRect(cx - 13, cy - 6, 4, 7); ctx.fillRect(cx + 9, cy - 6, 4, 7);
      break;
    case "bow":
      if (dir === "up") break;
      ctx.fillStyle = "#ff6b9d";
      ctx.beginPath(); ctx.arc(cx + 8, cy - 12, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 13, cy - 12, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ff4081"; ctx.beginPath(); ctx.arc(cx + 10.5, cy - 12, 2, 0, Math.PI * 2); ctx.fill();
      break;
    case "hat":
      ctx.fillStyle = "#2c3e50"; ctx.fillRect(cx - 13, cy - 14, 26, 3); ctx.fillRect(cx - 9, cy - 22, 18, 10);
      ctx.fillStyle = "#e2b714"; ctx.fillRect(cx - 9, cy - 14, 18, 2);
      break;
    case "earrings":
      if (dir === "up") break;
      ctx.fillStyle = "#FFD700";
      if (dir === "down") {
        ctx.beginPath(); ctx.arc(cx - 9, cy + 2, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + 9, cy + 2, 2, 0, Math.PI * 2); ctx.fill();
      } else if (dir === "left") { ctx.beginPath(); ctx.arc(cx - 10, cy + 2, 2, 0, Math.PI * 2); ctx.fill(); }
      else { ctx.beginPath(); ctx.arc(cx + 10, cy + 2, 2, 0, Math.PI * 2); ctx.fill(); }
      break;
    case "bandana":
      ctx.fillStyle = "#e74c3c"; ctx.fillRect(cx - 10, cy - 9, 20, 4);
      ctx.beginPath(); ctx.arc(cx + 10, cy - 7, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(cx + 10, cy - 6, 6, 2); ctx.fillRect(cx + 10, cy - 9, 6, 2);
      break;
    case "scarf":
      ctx.fillStyle = "#e67e22";
      ctx.fillRect(cx - 9, cy + 10, 18, 6);
      ctx.fillRect(cx - 4, cy + 14, 6, 8);
      ctx.fillStyle = "#d35400";
      ctx.fillRect(cx - 9, cy + 13, 18, 2);
      break;
    case "beanie":
      ctx.fillStyle = "#37474f";
      ctx.beginPath(); ctx.arc(cx, cy - 8, 11, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - 11, cy - 9, 22, 5);
      ctx.fillStyle = "#546e7a"; ctx.fillRect(cx - 11, cy - 6, 22, 3);
      ctx.fillStyle = "#ff5722"; ctx.beginPath(); ctx.arc(cx, cy - 19, 3, 0, Math.PI * 2); ctx.fill();
      break;
  }
}

// ═══════════════════════════════════════════
//  MAP - Modern Office (1600 x 1000)
// ═══════════════════════════════════════════
const MAP = { width: 1600, height: 1000, tileSize: 32 };

const FLOOR_ZONES = [
  { x: 14,   y: 14,  w: 806, h: 456, color: "#ede5d8" },     // Work area
  { x: 838,  y: 14,  w: 748, h: 456, color: "#dce3ed" },     // Meeting room
  { x: 14,   y: 470, w: 1572, h: 60, color: "#e8e4de" },     // Central corridor
  { x: 14,   y: 530, w: 460, h: 456, color: "#e5e5e0" },     // Kitchen
  { x: 474,  y: 530, w: 626, h: 456, color: "#e0d8ce" },     // Lounge
  { x: 1118, y: 530, w: 468, h: 456, color: "#ddd5e5" },     // Rest/Nap
];

const ZONE_LABELS = [
  { text: "WORKSPACE", x: 420, y: 260 },
  { text: "MEETING", x: 1200, y: 260 },
  { text: "KITCHEN", x: 240, y: 760 },
  { text: "LOUNGE", x: 780, y: 760 },
  { text: "REST", x: 1350, y: 760 },
];

const WALLS = [
  // Outer walls
  { x: 0, y: 0, w: MAP.width, h: 14 },
  { x: 0, y: MAP.height - 14, w: MAP.width, h: 14 },
  { x: 0, y: 0, w: 14, h: MAP.height },
  { x: MAP.width - 14, y: 0, w: 14, h: MAP.height },
  // Meeting room left wall (100px doorway at y=190-290)
  { x: 830, y: 14, w: 8, h: 176 },

const FURNITURE = [
  // ── Work Area: 3x3 desks + standing desks ──
  { type: "modern_desk", x: 60,  y: 60,  w: 100, h: 50 },
  { type: "modern_desk", x: 60,  y: 200, w: 100, h: 50 },
  { type: "modern_desk", x: 60,  y: 340, w: 100, h: 50 },

  // Desk chairs
  { type: "office_chair", x: 95,  y: 120, w: 22, h: 22 },

  { type: "office_chair", x: 315, y: 260, w: 22, h: 22 },
  { type: "office_chair", x: 315, y: 400, w: 22, h: 22 },
  { type: "office_chair", x: 535, y: 120, w: 22, h: 22 },

  { type: "office_chair", x: 535, y: 400, w: 22, h: 22 },
  // Standing desks
  { type: "standing_desk", x: 690, y: 80,  w: 70, h: 40 },
  { type: "standing_desk", x: 690, y: 240, w: 70, h: 40 },
  { type: "standing_desk", x: 690, y: 400, w: 70, h: 40 },

  // ── Meeting Room ──
  { type: "conf_table", x: 960, y: 130, w: 220, h: 120 },
  { type: "office_chair", x: 990,  y: 95,  w: 22, h: 22 },
  { type: "office_chair", x: 1050, y: 95,  w: 22, h: 22 },

//  RENDERING HELPERS
// ═══════════════════════════════════════════
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
}

function drawFloor(ctx) {
  ctx.fillStyle = "#e0d6c8";
  ctx.fillRect(0, 0, MAP.width, MAP.height);
  for (const z of FLOOR_ZONES) {
    ctx.fillStyle = z.color;
    ctx.fillRect(z.x, z.y, z.w, z.h);
  }
  // Subtle grid
  ctx.strokeStyle = "rgba(0,0,0,0.03)";
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= MAP.height / MAP.tileSize; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * MAP.tileSize); ctx.lineTo(MAP.width, r * MAP.tileSize); ctx.stroke();
  }
  for (let c = 0; c <= MAP.width / MAP.tileSize; c++) {
    ctx.beginPath(); ctx.moveTo(c * MAP.tileSize, 0); ctx.lineTo(c * MAP.tileSize, MAP.height); ctx.stroke();
  }
  // Zone labels
  ctx.font = "bold 32px 'Segoe UI', system-ui";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for (const label of ZONE_LABELS) {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillText(label.text, label.x, label.y);
  }
}

function drawWalls(ctx) {
  for (const w of WALLS) {
    ctx.fillStyle = "#4a4a5a";
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.fillStyle = "#5a5a6a";
    ctx.fillRect(w.x, w.y, w.w, Math.min(2, w.h));
  }
}

function drawFurniture(ctx, item) {
  const { type, x, y, w, h } = item;
  switch (type) {
    case "modern_desk":
      ctx.fillStyle = "#f0ebe5"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#d9d2c9"; ctx.fillRect(x, y + h - 3, w, 3);
      ctx.fillStyle = "#888"; ctx.fillRect(x + 4, y + h, 3, 4); ctx.fillRect(x + w - 7, y + h, 3, 4);
      ctx.fillStyle = "#222"; ctx.fillRect(x + w/2 - 16, y + 4, 32, 22);
      ctx.fillStyle = "#3a7bd5"; ctx.fillRect(x + w/2 - 14, y + 6, 28, 17);
      ctx.fillStyle = "#444"; ctx.fillRect(x + w/2 - 3, y + 26, 6, 3); ctx.fillRect(x + w/2 - 10, y + 28, 20, 2);
      ctx.fillStyle = "#ccc"; ctx.fillRect(x + w/2 - 18, y + 34, 36, 10);
      ctx.fillStyle = "#bbb"; ctx.fillRect(x + w/2 + 22, y + 36, 10, 7);
      break;
    case "standing_desk":
      ctx.fillStyle = "#f0ebe5"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#d9d2c9"; ctx.fillRect(x, y + h - 2, w, 2);
      ctx.fillStyle = "#666"; ctx.fillRect(x + 6, y + h, 2, 8); ctx.fillRect(x + w - 8, y + h, 2, 8);
      ctx.fillStyle = "#555"; ctx.fillRect(x + w/2 - 14, y + 6, 28, 18);
      ctx.fillStyle = "#4a90d9"; ctx.fillRect(x + w/2 - 12, y + 8, 24, 14);
      break;
    case "office_chair":
      ctx.fillStyle = "#333"; ctx.beginPath(); ctx.arc(x + w/2, y + h/2, w/2 - 1, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#444"; ctx.beginPath(); ctx.arc(x + w/2, y + h/2, w/2 - 4, 0, Math.PI * 2); ctx.fill();
      break;
    case "conf_table":
      ctx.fillStyle = "#6a5a4a"; roundRect(ctx, x, y, w, h, 12); ctx.fill();
      ctx.fillStyle = "#7a6a5a"; roundRect(ctx, x + 3, y + 3, w - 6, h - 6, 10); ctx.fill();
      break;
    case "tv_wall":
      ctx.fillStyle = "#111"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#2a6ad4"; ctx.fillRect(x + 2, y + 1, w - 4, h - 2);
      break;
    case "whiteboard":
      ctx.fillStyle = "#f5f5f5"; ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = "#ccc"; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
      ctx.strokeStyle = "#4a90d9"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x + 8, y + 3); ctx.lineTo(x + 80, y + 3); ctx.stroke();
      ctx.strokeStyle = "#e74c3c";
      ctx.beginPath(); ctx.moveTo(x + 8, y + 7); ctx.lineTo(x + 55, y + 7); ctx.stroke();
      break;
    case "phone_booth":
      ctx.fillStyle = "rgba(100,140,180,0.25)"; ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = "#7a9ab5"; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = "#d9d2c9"; ctx.fillRect(x + 8, y + 30, w - 16, 14);
      ctx.fillStyle = "#555"; ctx.beginPath(); ctx.arc(x + w/2, y + 55, 8, 0, Math.PI * 2); ctx.fill();
      break;
    case "counter_long":
      ctx.fillStyle = "#e0e0e0"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#ccc"; ctx.fillRect(x, y + h - 3, w, 3);
      ctx.fillStyle = "#bbb"; ctx.fillRect(x + 80, y + 8, 30, 18);
      ctx.fillStyle = "#999"; ctx.fillRect(x + 84, y + 10, 22, 14);
      ctx.fillStyle = "#ccc"; ctx.fillRect(x + 93, y + 4, 4, 6);
      break;
    case "coffee_machine":
      ctx.fillStyle = "#333"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#444"; ctx.fillRect(x + 3, y + 3, w - 6, 10);
      ctx.fillStyle = "#4f4"; ctx.fillRect(x + 5, y + 5, 4, 4);
      ctx.fillStyle = "#777"; ctx.fillRect(x + 12, y + 18, 20, 14);
      ctx.fillStyle = "#3a1a0a"; ctx.fillRect(x + 14, y + 20, 16, 10);
      break;
    case "fridge":
      ctx.fillStyle = "#e8e8e8"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#ddd"; ctx.fillRect(x, y + h * 0.6, w, 2);
      ctx.fillStyle = "#bbb"; ctx.fillRect(x + w - 6, y + 8, 3, 10); ctx.fillRect(x + w - 6, y + h * 0.6 + 6, 3, 8);
      break;
    case "vending":
      ctx.fillStyle = "#2c3e50"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#34495e"; ctx.fillRect(x + 4, y + 4, w - 8, h * 0.6);
      const vColors = ["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6"];
      for (let i = 0; i < 5; i++) { ctx.fillStyle = vColors[i]; ctx.fillRect(x + 6 + i * 7, y + 6, 5, 12); }
      ctx.fillStyle = "#1a252f"; ctx.fillRect(x + 10, y + h * 0.7, w - 20, 10);
      break;
    case "microwave":
      ctx.fillStyle = "#ddd"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#333"; ctx.fillRect(x + 3, y + 3, w * 0.65, h - 6);
      ctx.fillStyle = "#555"; ctx.fillRect(x + 5, y + 5, w * 0.65 - 4, h - 10);
      ctx.fillStyle = "#aaa"; ctx.fillRect(x + w * 0.72, y + 6, 6, 6);
      break;
    case "dining_table":
      ctx.fillStyle = "#f0ebe5"; roundRect(ctx, x, y, w, h, 6); ctx.fill();
      ctx.fillStyle = "#888"; ctx.fillRect(x + 6, y + h, 3, 3); ctx.fillRect(x + w - 9, y + h, 3, 3);
      break;
    case "stool":
      ctx.fillStyle = "#666"; ctx.beginPath(); ctx.arc(x + w/2, y + h/2, w/2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#777"; ctx.beginPath(); ctx.arc(x + w/2, y + h/2, w/2 - 3, 0, Math.PI * 2); ctx.fill();
      break;
    case "sofa":
      ctx.fillStyle = "#5c6bc0"; roundRect(ctx, x, y, w, h, 6); ctx.fill();
      ctx.fillStyle = "#7986cb"; roundRect(ctx, x + 4, y + 10, w - 8, h - 12, 4); ctx.fill();
      ctx.fillStyle = "#5c6bc0"; ctx.fillRect(x, y + 6, 10, h - 8); ctx.fillRect(x + w - 10, y + 6, 10, h - 8);
      ctx.strokeStyle = "rgba(0,0,0,0.08)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x + w/3, y + 12); ctx.lineTo(x + w/3, y + h - 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + w*2/3, y + 12); ctx.lineTo(x + w*2/3, y + h - 4); ctx.stroke();
      break;
    case "coffee_table":
      ctx.fillStyle = "#8d6e63"; roundRect(ctx, x, y, w, h, 4); ctx.fill();
      ctx.fillStyle = "#795548"; roundRect(ctx, x + 2, y + 2, w - 4, h - 4, 3); ctx.fill();
      ctx.fillStyle = "#e74c3c"; ctx.fillRect(x + 10, y + 10, 16, 12);
      ctx.fillStyle = "#3498db"; ctx.fillRect(x + 30, y + 14, 14, 10);
      break;
    case "tv_stand":
      ctx.fillStyle = "#5d4037"; ctx.fillRect(x, y + 16, w, 12);
      ctx.fillStyle = "#111"; ctx.fillRect(x + 10, y, w - 20, 18);
      ctx.fillStyle = "#1a1a2e"; ctx.fillRect(x + 12, y + 1, w - 24, 15);
      break;
    case "pingpong":
      ctx.fillStyle = "#1b5e20"; roundRect(ctx, x, y, w, h, 4); ctx.fill();
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x + w/2, y + 4); ctx.lineTo(x + w/2, y + h - 4); ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.fillRect(x + w/2 - 1, y + 2, 2, h - 4);
      ctx.fillStyle = "#333"; ctx.fillRect(x + 6, y + h, 3, 4); ctx.fillRect(x + w - 9, y + h, 3, 4);
      break;
    case "arcade":
      ctx.fillStyle = "#1a237e"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#283593"; ctx.fillRect(x + 4, y + 4, w - 8, h * 0.5);
      ctx.fillStyle = "#4fc3f7"; ctx.fillRect(x + 6, y + 6, w - 12, h * 0.5 - 4);
      ctx.fillStyle = "#333"; ctx.fillRect(x + 8, y + h * 0.6, w - 16, h * 0.3);
      ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.arc(x + w/2 + 6, y + h * 0.7, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4caf50"; ctx.beginPath(); ctx.arc(x + w/2 - 6, y + h * 0.7, 3, 0, Math.PI * 2); ctx.fill();
      break;
    case "beanbag":
      ctx.fillStyle = "#e8a060"; ctx.beginPath(); ctx.ellipse(x + w/2, y + h/2, w/2, h/2.4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(0,0,0,0.06)"; ctx.beginPath(); ctx.ellipse(x + w/2 + 2, y + h/2 + 2, w/3, h/3.5, 0, 0, Math.PI * 2); ctx.fill();
      break;
    case "bookshelf":
      ctx.fillStyle = "#5d4037"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#4e342e"; ctx.fillRect(x, y + h/3, w, 2); ctx.fillRect(x, y + h*2/3, w, 2);
      const bkColors = ["#e74c3c","#4a90d9","#2ecc71","#f39c12","#9b59b6","#e67e22","#1abc9c","#e91e63","#00bcd4","#ff5722"];
      for (let i = 0; i < Math.floor(w / 10); i++) { ctx.fillStyle = bkColors[i % bkColors.length]; ctx.fillRect(x + 3 + i * 10, y + 2, 8, h/3 - 4); }
      break;
    case "bed":
      // Frame
      ctx.fillStyle = "#8d6e63"; roundRect(ctx, x, y, w, h, 4); ctx.fill();
      // Mattress
      ctx.fillStyle = "#c5cae9"; roundRect(ctx, x + 3, y + 3, w - 6, h - 6, 3); ctx.fill();
      // Pillow
      ctx.fillStyle = "#e8e5e0"; roundRect(ctx, x + w/2 - 18, y + 6, 36, 16, 4); ctx.fill();
      // Blanket
      ctx.fillStyle = "#7986cb"; roundRect(ctx, x + 6, y + h * 0.4, w - 12, h * 0.5, 3); ctx.fill();
      ctx.fillStyle = "#5c6bc0"; ctx.fillRect(x + 6, y + h * 0.4, w - 12, 3);
      break;
    case "nightstand":
      ctx.fillStyle = "#8d6e63"; ctx.fillRect(x, y, w, h);
      ctx.fillStyle = "#795548"; ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
      // Lamp
      ctx.fillStyle = "#ffeb3b"; ctx.beginPath(); ctx.arc(x + w/2, y - 4, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#f9a825"; ctx.fillRect(x + w/2 - 2, y - 2, 4, 6);
      break;
    case "plant_big":
      ctx.fillStyle = "#5d4037"; ctx.fillRect(x + 7, y + 16, 16, 14);
      ctx.fillStyle = "#4e342e"; ctx.fillRect(x + 5, y + 14, 20, 4);
      ctx.fillStyle = "#388e3c"; ctx.beginPath(); ctx.arc(x + 15, y + 7, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4caf50"; ctx.beginPath(); ctx.arc(x + 11, y + 11, 7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 19, y + 11, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#66bb6a"; ctx.beginPath(); ctx.arc(x + 15, y + 4, 6, 0, Math.PI * 2); ctx.fill();
      break;
    case "plant_small":
      ctx.fillStyle = "#5d4037"; ctx.fillRect(x + 5, y + 12, 12, 10);
      ctx.fillStyle = "#388e3c"; ctx.beginPath(); ctx.arc(x + 11, y + 7, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#4caf50"; ctx.beginPath(); ctx.arc(x + 11, y + 4, 5, 0, Math.PI * 2); ctx.fill();
      break;
    case "rug":
      ctx.fillStyle = "rgba(120,100,80,0.12)"; roundRect(ctx, x, y, w, h, 10); ctx.fill();
      ctx.strokeStyle = "rgba(120,100,80,0.2)"; ctx.lineWidth = 2;
      roundRect(ctx, x + 8, y + 8, w - 16, h - 16, 6); ctx.stroke();
      break;
  }
}

function drawProp(ctx, prop) {
  const { type, x, y } = prop;
  switch (type) {
    case "mug":

// ═══════════════════════════════════════════
//  COLLISION + A* PATHFINDING
// ═══════════════════════════════════════════
function checkCollision(px, py) {
  const box = { x: px - 6, y: py + 16, w: 12, h: 12 };
  for (const w of WALLS) { if (aabb(box, w)) return true; }
  for (const f of FURNITURE) { if (f.noCollision) continue; if (aabb(box, f)) return true; }
  return false;
}
function aabb(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

const GRID_SIZE = 16;
let navGrid = null, navCols = 0, navRows = 0;

function buildNavGrid() {
  navCols = Math.ceil(MAP.width / GRID_SIZE);
  navRows = Math.ceil(MAP.height / GRID_SIZE);
  navGrid = new Uint8Array(navCols * navRows);
  for (let r = 0; r < navRows; r++) {
    for (let c = 0; c < navCols; c++) {
      const px = c * GRID_SIZE + GRID_SIZE / 2;
      const py = r * GRID_SIZE + GRID_SIZE / 2;
      navGrid[r * navCols + c] = checkCollision(px, py) ? 1 : 0;
    }
  }
}

// MinHeap for A*
class MinHeap {
  constructor() { this.d = []; }
  push(v) { this.d.push(v); let i = this.d.length - 1; while (i > 0) { const p = (i-1)>>1; if (this.d[i].f >= this.d[p].f) break; [this.d[i],this.d[p]]=[this.d[p],this.d[i]]; i=p; } }
  pop() { const t=this.d[0]; const l=this.d.pop(); if(this.d.length>0){this.d[0]=l;let i=0;const n=this.d.length;while(true){let m=i;const a=2*i+1,b=2*i+2;if(a<n&&this.d[a].f<this.d[m].f)m=a;if(b<n&&this.d[b].f<this.d[m].f)m=b;if(m===i)break;[this.d[i],this.d[m]]=[this.d[m],this.d[i]];i=m;}} return t; }
  get size() { return this.d.length; }
}

function findPath(sx, sy, ex, ey) {
  if (!navGrid) return null;
  let sc = Math.floor(sx / GRID_SIZE), sr = Math.floor(sy / GRID_SIZE);
  let ec = Math.floor(ex / GRID_SIZE), er = Math.floor(ey / GRID_SIZE);
  sc = Math.max(0, Math.min(navCols-1, sc)); sr = Math.max(0, Math.min(navRows-1, sr));
  ec = Math.max(0, Math.min(navCols-1, ec)); er = Math.max(0, Math.min(navRows-1, er));

  // If end blocked, find nearest walkable
  if (navGrid[er * navCols + ec]) {
    const alt = nearestWalkable(ec, er);
    if (!alt) return null;
    ec = alt.c; er = alt.r;
  }
  if (navGrid[sr * navCols + sc]) {
    const alt = nearestWalkable(sc, sr);
    if (!alt) return null;
    sc = alt.c; sr = alt.r;
  }

  const start = sr * navCols + sc, end = er * navCols + ec;
  if (start === end) return [{ x: ex, y: ey }];

  const DIRS = [[-1,0,10],[1,0,10],[0,-1,10],[0,1,10],[-1,-1,14],[1,-1,14],[-1,1,14],[1,1,14]];
  const total = navCols * navRows;
  const gScore = new Float32Array(total).fill(1e9);
  const cameFrom = new Int32Array(total).fill(-1);
  const closed = new Uint8Array(total);

  gScore[start] = 0;
  const open = new MinHeap();
  open.push({ idx: start, f: octile(sc, sr, ec, er) });

  while (open.size > 0) {
    const cur = open.pop();
    if (closed[cur.idx]) continue;
    if (cur.idx === end) {
      const path = [];
      let n = end;
      while (n !== start) {
        const pr = Math.floor(n / navCols), pc = n % navCols;
        path.unshift({ x: pc * GRID_SIZE + GRID_SIZE/2, y: pr * GRID_SIZE + GRID_SIZE/2 });
        n = cameFrom[n];
      }
      // Replace last waypoint with actual target
      if (path.length > 0) { path[path.length-1].x = ex; path[path.length-1].y = ey; }
      return simplifyPath(path);
    }
    closed[cur.idx] = 1;
    const cr = Math.floor(cur.idx / navCols), cc = cur.idx % navCols;

    for (const [dr, dc, cost] of DIRS) {
      const nr = cr + dr, nc = cc + dc;
      if (nr < 0 || nr >= navRows || nc < 0 || nc >= navCols) continue;
      const nIdx = nr * navCols + nc;
      if (closed[nIdx] || navGrid[nIdx]) continue;
      if (dr !== 0 && dc !== 0) {
        if (navGrid[cr * navCols + nc] || navGrid[nr * navCols + cc]) continue;
      }
      const tentG = gScore[cur.idx] + cost;
      if (tentG < gScore[nIdx]) {
        cameFrom[nIdx] = cur.idx;
        gScore[nIdx] = tentG;
        open.push({ idx: nIdx, f: tentG + octile(nc, nr, ec, er) });
      }
    }
  }
  return null;
}

function octile(c1, r1, c2, r2) {
  const dx = Math.abs(c2 - c1), dy = Math.abs(r2 - r1);
  return 10 * (dx + dy) - 6 * Math.min(dx, dy);
}

function nearestWalkable(tc, tr) {
  for (let rad = 1; rad < 30; rad++) {
    for (let dr = -rad; dr <= rad; dr++) {
      for (let dc = -rad; dc <= rad; dc++) {
        if (Math.abs(dr) !== rad && Math.abs(dc) !== rad) continue;
        const nr = tr + dr, nc = tc + dc;
        if (nr >= 0 && nr < navRows && nc >= 0 && nc < navCols && !navGrid[nr * navCols + nc])
          return { c: nc, r: nr };
      }
    }
  }
  return null;
}

function simplifyPath(path) {
  if (path.length <= 2) return path;
  const s = [path[0]];
  for (let i = 1; i < path.length - 1; i++) {
    const p = s[s.length - 1], n = path[i + 1];
    if ((path[i].x - p.x) !== (n.x - path[i].x) || (path[i].y - p.y) !== (n.y - path[i].y))
      s.push(path[i]);
  }
  s.push(path[path.length - 1]);
  return s;
}

//  EMOJI AURA EFFECT SYSTEM (Body-Wrapping)
// ═══════════════════════════════════════════
function bodyPoint(px, py) {
  const r = Math.random();
  if (r < 0.25) { const a = Math.random()*Math.PI*2; return { x: px+Math.cos(a)*11, y: py-4+Math.sin(a)*11 }; }
  if (r < 0.5) return { x: px-10-Math.random()*4, y: py+2+Math.random()*14 };
  if (r < 0.75) return { x: px+10+Math.random()*4, y: py+2+Math.random()*14 };
  return { x: px+(Math.random()-0.5)*12, y: py+16+Math.random()*12 };
}

function updateAura(playerId, emoji, px, py, dt) {
  if (!auraParticles.has(playerId)) auraParticles.set(playerId, []);
  const parts = auraParticles.get(playerId);
  const dts = dt / 1000;
  switch (emoji) {
    case "😀": { // 광기의 미소 — golden energy radiating from body outline
      for (let i = 0; i < 6; i++) {
        const bp = bodyPoint(px, py);
        const a = Math.atan2(bp.y-(py+5), bp.x-px);
        parts.push({ x:bp.x, y:bp.y, vx:Math.cos(a)*(40+Math.random()*50), vy:Math.sin(a)*(40+Math.random()*50), life:0.25+Math.random()*0.35, ml:0.6, color:Math.random()>0.3?"#FFD700":"#FFF176", size:1.5+Math.random()*2.5, t:"spark", gy:0 });
      }
      if (Math.random()<0.18) {
        parts.push({ x:px, y:py+5, vx:0, vy:0, life:0.35, ml:0.35, color:"#FFD700", size:0, t:"ring", gy:0 });
      }
      break;
    }
    case "🔥": { // 불의 화신 — engulfing fire across entire body
      const fc = ["#fff176","#ffee58","#ffca28","#ffa726","#ff7043","#f44336","#d32f2f"];
      for (let i = 0; i < 10; i++) {
        const bp = bodyPoint(px, py);
        parts.push({ x:bp.x, y:bp.y, vx:(Math.random()-0.5)*18+(bp.x-px)*0.8, vy:-45-Math.random()*45, life:0.25+Math.random()*0.4, ml:0.65, color:fc[Math.floor(Math.random()*fc.length)], size:2.5+Math.random()*4, t:"flame", gy:-35 });
      }
      for (let i = 0; i < 5; i++) {
        const ox = (Math.random()-0.5)*16;
        parts.push({ x:px+ox, y:py+22+Math.random()*6, vx:ox*1.5, vy:-65-Math.random()*35, life:0.2+Math.random()*0.3, ml:0.5, color:Math.random()>0.5?"#ffca28":"#fff176", size:3+Math.random()*3, t:"flame", gy:-40 });
      }
      break;
    }
    case "❤️": { // 팜므파탈 — hearts floating from body outline
      for (let i = 0; i < 2; i++) {
        const bp = bodyPoint(px, py);
        const a = Math.atan2(bp.y-(py+5), bp.x-px);
        parts.push({ x:bp.x, y:bp.y, vx:Math.cos(a)*8+(Math.random()-0.5)*12, vy:-18-Math.random()*22, life:0.8+Math.random()*0.8, ml:1.6, color:Math.random()>0.4?"#ff4081":"#f50057", size:6+Math.random()*8, t:"heart", gy:0 });
      }
      if (Math.random()<0.25) {
        const a = Math.random()*Math.PI*2;
        parts.push({ x:px+Math.cos(a)*24, y:py+5+Math.sin(a)*15, vx:0, vy:0, life:2+Math.random(), ml:3, color:"#ff80ab", size:10+Math.random()*6, t:"orbit", a:a, r:22+Math.random()*10, cx:px, cy:py+5, spd:1.5+Math.random(), gy:0 });
      }
      break;
    }
    case "😢": { // 분수 눈물 — fountain tears from both eyes
      for (let i = 0; i < 3; i++) {
        parts.push({ x:px-4, y:py-4, vx:-22-Math.random()*18, vy:-22-Math.random()*15, life:0.5+Math.random()*0.3, ml:0.8, color:Math.random()>0.5?"#42a5f5":"#90caf9", size:2+Math.random()*1.5, t:"tear", gy:85 });
      }
      for (let i = 0; i < 3; i++) {
        parts.push({ x:px+4, y:py-4, vx:22+Math.random()*18, vy:-22-Math.random()*15, life:0.5+Math.random()*0.3, ml:0.8, color:Math.random()>0.5?"#42a5f5":"#64b5f6", size:2+Math.random()*1.5, t:"tear", gy:85 });
      }
      break;
    }
    case "⚡": { // 초사이어인 — lightning bolts + sparks on body
      for (let i = 0; i < 5; i++) {
        const bp = bodyPoint(px, py);
        parts.push({ x:bp.x, y:bp.y, vx:(Math.random()-0.5)*90, vy:(Math.random()-0.5)*90, life:0.04+Math.random()*0.08, ml:0.12, color:Math.random()>0.4?"#FFEB3B":"#fff", size:1+Math.random()*2.5, t:"spark", gy:0 });
      }
      if (Math.random()<0.4) {
        parts.push({ x:px+(Math.random()-0.5)*14, y:py-12, vx:(Math.random()-0.5)*8, vy:-70-Math.random()*50, life:0.12+Math.random()*0.1, ml:0.22, color:"#FFD600", size:1.5, t:"streak", gy:0 });
      }
      break;
    }
  }
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.life -= dts;
    if (p.life <= 0) { parts.splice(i, 1); continue; }
    if (p.t === "orbit") { p.a += p.spd*dts; p.cx = px; p.cy = py+5; p.x = p.cx+Math.cos(p.a)*p.r; p.y = p.cy+Math.sin(p.a)*(p.r*0.6); }
    else if (p.t === "ring") { p.size += 65*dts; }
    else { p.x += p.vx*dts; p.y += p.vy*dts; if (p.gy) p.vy += p.gy*dts; }
  }
}

  } else if (emoji === "😢") {
    ctx.globalAlpha = 0.3; ctx.strokeStyle = "#64b5f6"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(px-4,py-2); ctx.quadraticCurveTo(px-8,py+4,px-6,py+10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+4,py-2); ctx.quadraticCurveTo(px+8,py+4,px+6,py+10); ctx.stroke();
    ctx.globalAlpha = 1;
  } else if (emoji === "⚡") {
    const fl = 0.15+Math.random()*0.12;
    const g = ctx.createRadialGradient(px,py+5,3,px,py+5,38);
    g.addColorStop(0,`rgba(255,235,59,${fl+0.15})`); g.addColorStop(0.5,`rgba(255,215,0,${fl})`); g.addColorStop(1,"rgba(255,215,0,0)");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px,py+5,38,0,Math.PI*2); ctx.fill();
    drawBolts(ctx, px, py);
  }
  // Draw particles
  for (const p of parts) {
    const alpha = Math.max(0, p.life / p.ml);
    ctx.globalAlpha = alpha;
    switch (p.t) {
      case "spark": {
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*alpha*0.4,0,Math.PI*2); ctx.fill();
        break;
      }
      case "ring": {
        ctx.strokeStyle = p.color; ctx.lineWidth = 2.5*alpha; ctx.globalAlpha = alpha*0.4;
        ctx.beginPath(); ctx.arc(px,py+5,p.size,0,Math.PI*2); ctx.stroke();
        break;
      }
      case "flame": {
        const s = p.size*(0.3+alpha*0.7);
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x,p.y,s,0,Math.PI*2); ctx.fill();
        break;
      }
      case "heart": case "orbit": {
        ctx.font = `${Math.round(p.size*Math.max(0.3,alpha))}px serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillStyle = p.color; ctx.fillText("❤",p.x,p.y);
        break;
      }
      case "tear": {
        ctx.fillStyle = p.color; const s = p.size;
        ctx.beginPath(); ctx.moveTo(p.x,p.y-s*1.5);
        ctx.quadraticCurveTo(p.x+s,p.y,p.x,p.y+s);
        ctx.quadraticCurveTo(p.x-s,p.y,p.x,p.y-s*1.5); ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.arc(p.x,p.y-s*0.3,s*0.4,0,Math.PI*2); ctx.fill();
        break;
      }
      case "streak": {
        ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.globalAlpha = alpha*0.8;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+p.vx*0.03,p.y+p.vy*0.03); ctx.stroke();
        break;
      }
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawBolts(ctx, px, py) {
  const n = 2+Math.floor(Math.random()*3);
  for (let b = 0; b < n; b++) {
    const p1 = bodyPoint(px,py), p2 = bodyPoint(px,py);
    const segs = 3+Math.floor(Math.random()*4);
    const pts = [];
    for (let i = 0; i <= segs; i++) {
      const t = i/segs;
      pts.push({ x:p1.x+(p2.x-p1.x)*t+(i>0&&i<segs?(Math.random()-0.5)*16:0), y:p1.y+(p2.y-p1.y)*t+(i>0&&i<segs?(Math.random()-0.5)*16:0) });
    }
    ctx.strokeStyle = "rgba(255,235,59,0.5)"; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();
    ctx.strokeStyle = Math.random()>0.5?"#fff":"#FFEB3B"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();
  }
}

function setupEntryScreen() {
  const container = document.getElementById("character-select");
  CHARACTERS.forEach((ch, i) => {
    const canvas = document.createElement("canvas");
    canvas.className = "char-preview" + (i === 0 ? " selected" : "");
    canvas.width = 52; canvas.height = 64;
    container.appendChild(canvas);
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    drawCharacter(ctx, 26, 34, i, "down", "", false, 0);
    canvas.addEventListener("click", () => {
      selectedCharacter = i;
      document.querySelectorAll(".char-preview").forEach(c => c.classList.remove("selected"));
      canvas.classList.add("selected");
    });
  });
  document.getElementById("join-btn").addEventListener("click", joinRoom);
  document.getElementById("name-input").addEventListener("keydown", (e) => { if (e.key === "Enter") joinRoom(); });
}

function joinRoom() {
  const nameInput = document.getElementById("name-input");
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); nameInput.style.borderColor = "#e74c3c"; setTimeout(() => nameInput.style.borderColor = "", 1000); return; }

  currentRoomCode = getRoomCode();
  socket = io();

  socket.on("connect", () => {
    socket.emit("join-room", { roomCode: currentRoomCode, name, character: selectedCharacter });
  });

  socket.on("room-state", ({ players, selfId, roomCode }) => {
    currentRoomCode = roomCode;
    remotePlayers.clear();
    for (const p of players) {
      if (p.id === selfId) localPlayer = { ...p, isMoving: false };
      else remotePlayers.set(p.id, { ...p, targetX: p.x, targetY: p.y, isMoving: false });
    }
    document.getElementById("entry-screen").style.display = "none";
    document.getElementById("game-area").style.display = "block";
    document.getElementById("chat-panel").style.display = "flex";
    document.getElementById("overlay").style.display = "none";
    updateHUD(); resizeCanvas(); buildNavGrid();
    if (!gameRunning) { gameRunning = true; requestAnimationFrame(gameLoop); }
  });

  socket.on("player-joined", (player) => {
    remotePlayers.set(player.id, { ...player, targetX: player.x, targetY: player.y, isMoving: false });
    addSystemMessage(player.name + " joined"); updateHUD();
  });

  socket.on("player-moved", ({ id, x, y, direction }) => {
    const p = remotePlayers.get(id);
    if (p) { p.targetX = x; p.targetY = y; p.direction = direction; }
  });

  socket.on("player-left", ({ id }) => {
    const p = remotePlayers.get(id);
    if (p) { addSystemMessage(p.name + " left"); remotePlayers.delete(id); chatBubbles.delete(id); auraParticles.delete(id); updateHUD(); }
  });

  socket.on("chat-message", ({ id, name: sn, text }) => {
    addChatMessage(sn, text, id === socket.id);
    chatBubbles.set(id, { text, startTime: Date.now() });
    if (id !== socket.id) playNotificationSound();
  });

  socket.on("emoji-toggle", ({ id, emoji }) => {
    const target = id === socket.id ? localPlayer : remotePlayers.get(id);
    if (target) target.activeEmoji = emoji;
    if (!emoji) auraParticles.delete(id);
    if (id === socket.id) updateEmojiButtons();
  });

  socket.on("throw-object", ({ id, targetId, fromX, fromY, toX, toY }) => {
    const isMe = targetId === socket.id;
    const target = isMe ? localPlayer : remotePlayers.get(targetId);
    if (!target) return;
    flyingPlayers.push({ playerId: targetId, charIdx: target.character, name: target.name, fromX, fromY, toX, toY, startTime: Date.now() });
    playThrowSound();
    setTimeout(() => {
      stunnedPlayers.set(targetId, { startTime: Date.now() });
      playLandSound();
      if (isMe && localPlayer) { localPlayer.x = toX; localPlayer.y = toY; movePath = null; moveTarget = null; }
      else { const p = remotePlayers.get(targetId); if (p) { p.x = toX; p.y = toY; p.targetX = toX; p.targetY = toY; } }
    }, THROW_FLY_DURATION);
  });

  socket.on("throw-prop", ({ id, propId, propType, fromX, fromY, toX, toY }) => {
    flyingProps.push({ propId, propType, fromX, fromY, toX, toY, startTime: Date.now(), throwerId: id });
    playThrowSound();
  });

  socket.on("disconnect", () => {
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("overlay-text").textContent = "Reconnecting...";
  });

  socket.on("reconnect", () => {
    socket.emit("join-room", { roomCode: currentRoomCode, name, character: selectedCharacter });
  });

  document.getElementById("overlay").style.display = "flex";
  document.getElementById("overlay-text").textContent = "Joining...";
}

// ═══════════════════════════════════════════
//  THROW SYSTEM (Players & Props)
// ═══════════════════════════════════════════
function getNearbyThrowables() {
  if (!localPlayer) return [];
  const result = [];
  for (const [id, p] of remotePlayers) {
    const dx = p.x - localPlayer.x, dy = p.y - localPlayer.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < THROW_RANGE && !isPlayerFlying(id) && !stunnedPlayers.has(id))
      result.push({ type: "player", id, data: p, dist });
  }
  for (const prop of THROWABLE_PROPS) {
    const dx = prop.x - localPlayer.x, dy = prop.y - localPlayer.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < INTERACT_RANGE)
      result.push({ type: "prop", id: prop.id, data: prop, dist });
  }
  return result;
}

document.getElementById("throw-btn").addEventListener("click", () => {
  const nearby = getNearbyThrowables();
  if (nearby.length === 0) return;
  throwMode = !throwMode;
  document.getElementById("throw-btn").classList.toggle("throw-active", throwMode);
  document.getElementById("game-area").style.cursor = throwMode ? "crosshair" : "pointer";
  if (!throwMode) hoverTarget = null;
});

function throwPlayer(targetId, targetPlayer) {
  if (!localPlayer || !socket) return;
  const dx = targetPlayer.x - localPlayer.x, dy = targetPlayer.y - localPlayer.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const throwDist = 150 + Math.random() * 50;
  let toX = targetPlayer.x + (dx / dist) * throwDist;
  let toY = targetPlayer.y + (dy / dist) * throwDist;
  toX = Math.max(30, Math.min(MAP.width - 30, toX));
  toY = Math.max(30, Math.min(MAP.height - 50, toY));
  socket.emit("throw-object", { targetId, fromX: targetPlayer.x, fromY: targetPlayer.y, toX, toY });
}

function throwPropItem(prop) {
  if (!localPlayer || !socket) return;
  // Find nearest other player to auto-aim
  let targetX, targetY;
  let closest = null, closestDist = 300;
  for (const [id, p] of remotePlayers) {
    const dx = p.x - localPlayer.x, dy = p.y - localPlayer.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < closestDist) { closestDist = d; closest = p; }
  }
  if (closest) { targetX = closest.x; targetY = closest.y; }
  else {
    const dirV = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };
    const dv = dirV[localPlayer.direction] || {x:0,y:1};
    targetX = localPlayer.x + dv.x * 200; targetY = localPlayer.y + dv.y * 200;
  }
  // Fly from prop position (not player), include propId for position update
  socket.emit("throw-prop", { propId: prop.id, propType: prop.type, fromX: prop.x, fromY: prop.y, toX: targetX, toY: targetY });
}

function drawFlyingPlayer(ctx, obj, now) {
  const t = Math.min(1, (now - obj.startTime) / THROW_FLY_DURATION);
  const px = obj.fromX + (obj.toX - obj.fromX) * t;
  const py = obj.fromY + (obj.toY - obj.fromY) * t - Math.sin(t * Math.PI) * 80;
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(t * Math.PI * 3);
  ctx.scale(0.8, 0.8);
  drawCharacter(ctx, 0, 0, obj.charIdx, "down", "", false, 0);
  ctx.restore();
  const groundY = obj.fromY + (obj.toY - obj.fromY) * t;
  const ss = 1 - Math.sin(t * Math.PI) * 0.5;
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.beginPath(); ctx.ellipse(px, groundY + 28, 10*ss, 3*ss, 0, 0, Math.PI*2); ctx.fill();
}

function drawFlyingPropItem(ctx, obj, now) {
  const t = Math.min(1, (now - obj.startTime) / PROP_FLY_DURATION);
  const px = obj.fromX + (obj.toX - obj.fromX) * t;
  const py = obj.fromY + (obj.toY - obj.fromY) * t - Math.sin(t * Math.PI) * 40;
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(t * Math.PI * 5);
  drawProp(ctx, { type: obj.propType, x: 0, y: 0 });
  ctx.restore();
}

function getStunScale(playerId) {
  const stun = stunnedPlayers.get(playerId);
  if (!stun) return { scaleX: 1, scaleY: 1, offsetY: 0 };
  const elapsed = Date.now() - stun.startTime;
  if (elapsed > STUN_DURATION) { stunnedPlayers.delete(playerId); return { scaleX: 1, scaleY: 1, offsetY: 0 }; }
  const t = elapsed / STUN_DURATION;
  let scaleX = 1, scaleY = 1, offsetY = 0;
  if (t < 0.25) { const p = t/0.25; scaleY = 1-p*0.55; scaleX = 1+p*0.3; offsetY = p*12; }
  else if (t < 0.5) { scaleY = 0.45; scaleX = 1.3; offsetY = 12; }
  else if (t < 0.8) { const p = (t-0.5)/0.3; scaleY = 0.45+p*0.65; scaleX = 1.3-p*0.35; offsetY = 12-p*14; }
  else { const p = (t-0.8)/0.2; scaleY = 1.1-p*0.1; scaleX = 0.95+p*0.05; offsetY = -2+p*2; }
  return { scaleX, scaleY, offsetY };
}

function getWobbleAngle(playerId) {
  const w = wobblePlayers.get(playerId);
  if (!w) return 0;
  const elapsed = Date.now() - w.startTime;
  if (elapsed > WOBBLE_DURATION) { wobblePlayers.delete(playerId); return 0; }
  const t = elapsed / WOBBLE_DURATION;
  return Math.sin(t * Math.PI * 6) * (1 - t) * 0.15;
}

function isPlayerFlying(playerId) { return flyingPlayers.some(f => f.playerId === playerId); }

window.addEventListener("keydown", (e) => {
  if (document.activeElement === document.getElementById("chat-input")) return;
  keys[e.key] = true;
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","w","W","a","A","s","S","d","D"].includes(e.key)) {
    movePath = null; moveTarget = null;
  }
  if (e.key === "Enter" && gameRunning) { document.getElementById("chat-input").focus(); e.preventDefault(); }
  if ((e.key === "t" || e.key === "T") && gameRunning) {
    const nearby = getNearbyThrowables();
    if (nearby.length === 0) return;
    throwMode = !throwMode;
    document.getElementById("throw-btn").classList.toggle("throw-active", throwMode);
    document.getElementById("game-area").style.cursor = throwMode ? "crosshair" : "pointer";
    if (!throwMode) hoverTarget = null;
  }
});
window.addEventListener("keyup", (e) => { keys[e.key] = false; });

// Mouse move for throw hover
document.getElementById("game-canvas").addEventListener("mousemove", (e) => {
  if (!throwMode || !localPlayer || !gameRunning) { hoverTarget = null; return; }
  const canvas = e.target, rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const sx = canvas.width / dpr / rect.width, sy = canvas.height / dpr / rect.height;
  const worldX = (e.clientX - rect.left) * sx - currentCamX;
  const worldY = (e.clientY - rect.top) * sy - currentCamY;
  hoverTarget = null;
  const nearby = getNearbyThrowables();
  for (const item of nearby) {
    const dx = item.data.x - worldX, dy = item.data.y - worldY;
    const hitR = item.type === "player" ? 25 : 15;
    if (Math.sqrt(dx*dx + dy*dy) < hitR) { hoverTarget = item; break; }
  }
  document.getElementById("game-area").style.cursor = hoverTarget ? "grab" : "crosshair";
});

// Click: move or throw
document.getElementById("game-canvas").addEventListener("click", (e) => {
  if (!localPlayer || !gameRunning) return;
  if (document.activeElement === document.getElementById("chat-input")) return;
  const canvas = e.target, rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const sx = canvas.width / dpr / rect.width, sy = canvas.height / dpr / rect.height;
  const worldX = (e.clientX - rect.left) * sx - currentCamX;
  const worldY = (e.clientY - rect.top) * sy - currentCamY;

  if (throwMode) {
    if (hoverTarget) {
      if (hoverTarget.type === "player") throwPlayer(hoverTarget.id, hoverTarget.data);
      else if (hoverTarget.type === "prop") throwPropItem(hoverTarget.data);
    }
    throwMode = false;
    hoverTarget = null;
    document.getElementById("throw-btn").classList.remove("throw-active");
    document.getElementById("game-area").style.cursor = "pointer";
    return;
  }

  // Pathfinding click-to-move
  const path = findPath(localPlayer.x, localPlayer.y, worldX, worldY);
  if (path && path.length > 0) {
    movePath = path;
    movePathIdx = 0;
    moveTarget = { x: path[path.length-1].x, y: path[path.length-1].y, time: Date.now() };
  } else if (!checkCollision(worldX, worldY)) {
    // Fallback: direct move if path not found but target is walkable
    movePath = [{ x: worldX, y: worldY }];
    movePathIdx = 0;
    moveTarget = { x: worldX, y: worldY, time: Date.now() };
  }
});

function handleInput(dt) {
  if (!localPlayer) return;
  if (document.activeElement === document.getElementById("chat-input")) { localPlayer.isMoving = false; return; }

  let dx = 0, dy = 0;
  const dist = SPEED * (dt / 1000);

  if (keys["ArrowUp"] || keys["w"] || keys["W"]) dy -= dist;
  if (keys["ArrowDown"] || keys["s"] || keys["S"]) dy += dist;
  if (keys["ArrowLeft"] || keys["a"] || keys["A"]) dx -= dist;
  if (keys["ArrowRight"] || keys["d"] || keys["D"]) dx += dist;

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  // Follow path waypoints
  if (dx === 0 && dy === 0 && movePath && movePathIdx < movePath.length) {
    const wp = movePath[movePathIdx];
    const tdx = wp.x - localPlayer.x, tdy = wp.y - localPlayer.y;
    const tdist = Math.sqrt(tdx * tdx + tdy * tdy);
    if (tdist < 5) {
      movePathIdx++;
      if (movePathIdx >= movePath.length) {
        movePath = null; moveTarget = null;
        localPlayer.isMoving = false;
        sendPosition();
        return;
      }
      return;
    }
    dx = (tdx / tdist) * dist;
    dy = (tdy / tdist) * dist;
  }

  if (dx === 0 && dy === 0) { localPlayer.isMoving = false; return; }

  if (Math.abs(dy) > Math.abs(dx)) localPlayer.direction = dy < 0 ? "up" : "down";
  else localPlayer.direction = dx < 0 ? "left" : "right";
  localPlayer.isMoving = true;

  const newX = localPlayer.x + dx;
  if (!checkCollision(newX, localPlayer.y)) localPlayer.x = newX;
  else if (movePath) { movePath = null; moveTarget = null; }

  const newY = localPlayer.y + dy;
  if (!checkCollision(localPlayer.x, newY)) localPlayer.y = newY;
  else if (movePath) { movePath = null; moveTarget = null; }

  localPlayer.x = Math.max(24, Math.min(MAP.width - 24, localPlayer.x));
  localPlayer.y = Math.max(24, Math.min(MAP.height - 40, localPlayer.y));
  sendPosition();
}

function sendPosition() {
  const now = Date.now();
  if (now - lastPositionSend < POSITION_SEND_INTERVAL) return;
  lastPositionSend = now;
  socket.emit("move", { x: localPlayer.x, y: localPlayer.y, direction: localPlayer.direction });
}

// ═══════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════
function update(dt) {
  const now = Date.now();
  // Remote player interpolation
  for (const [id, p] of remotePlayers) {
    if (p.targetX !== undefined) {
      const ox = p.x, oy = p.y;
      p.x += (p.targetX - p.x) * 0.18;
      p.y += (p.targetY - p.y) * 0.18;
      if (Math.abs(p.targetX - p.x) < 0.5) p.x = p.targetX;
      if (Math.abs(p.targetY - p.y) < 0.5) p.y = p.targetY;
      p.isMoving = Math.abs(p.x - ox) > 0.1 || Math.abs(p.y - oy) > 0.1;
    }
  }

  // Update aura particles for all players with active emoji
  if (localPlayer && localPlayer.activeEmoji) updateAura(socket.id, localPlayer.activeEmoji, localPlayer.x, localPlayer.y, dt);
  for (const [id, p] of remotePlayers) {
    if (p.activeEmoji) updateAura(id, p.activeEmoji, p.x, p.y, dt);
  }
  // Clean up aura for players without emoji
  for (const [pid] of auraParticles) {
    const isLocal = socket && pid === socket.id;
    const player = isLocal ? localPlayer : remotePlayers.get(pid);
    if (!player || !player.activeEmoji) {
      const parts = auraParticles.get(pid);
      if (parts) {
        const dts = dt / 1000;
        for (let i = parts.length - 1; i >= 0; i--) { parts[i].life -= dts; if (parts[i].life <= 0) parts.splice(i, 1); }
        if (parts.length === 0) auraParticles.delete(pid);
      }
    }
  }

  // Check prop hits on landing + update prop position
  for (let i = flyingProps.length - 1; i >= 0; i--) {
    const fp = flyingProps[i];
    if (now - fp.startTime >= PROP_FLY_DURATION) {
      // Move prop to landing position
      if (fp.propId) {
        const prop = THROWABLE_PROPS.find(p => p.id === fp.propId);
        if (prop) { prop.x = fp.toX; prop.y = fp.toY; }
      }
      // Check hit on any player near landing
      const hitCheck = (px, py, pid) => {
        const dx = px - fp.toX, dy = py - fp.toY;
        return Math.sqrt(dx*dx + dy*dy) < 35 && pid !== fp.throwerId;
      };
      for (const [id, p] of remotePlayers) {
        if (hitCheck(p.x, p.y, id)) { wobblePlayers.set(id, { startTime: now }); playHitSound(); break; }
      }
      if (localPlayer && socket && hitCheck(localPlayer.x, localPlayer.y, socket.id)) {
        wobblePlayers.set(socket.id, { startTime: now }); playHitSound();
      }
      flyingProps.splice(i, 1);
    }
  }

  // Update throw button state
  const nearby = getNearbyThrowables();
  const throwBtn = document.getElementById("throw-btn");
  if (nearby.length > 0) {
    throwBtn.classList.remove("throw-disabled");
    throwBtn.disabled = false;
  } else {
    throwBtn.classList.add("throw-disabled");
    throwBtn.disabled = true;
    if (throwMode) {
      throwMode = false; hoverTarget = null;
      throwBtn.classList.remove("throw-active");
      document.getElementById("game-area").style.cursor = "pointer";
    }
  }
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render() {
  const canvas = document.getElementById("game-canvas");
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const lw = canvas.width / dpr, lh = canvas.height / dpr;
  ctx.clearRect(0, 0, lw, lh);
  if (!localPlayer) return;

  let camX = lw / 2 - localPlayer.x;
  let camY = lh / 2 - localPlayer.y;
  camX = Math.min(0, Math.max(lw - MAP.width, camX));
  camY = Math.min(0, Math.max(lh - MAP.height, camY));
  currentCamX = camX; currentCamY = camY;

  ctx.save();
  ctx.translate(Math.floor(camX), Math.floor(camY));

  drawFloor(ctx);
  for (const f of FURNITURE) { if (f.type === "rug") drawFurniture(ctx, f); }
  drawWalls(ctx);

  // Draw throwable props
  for (const prop of THROWABLE_PROPS) drawProp(ctx, prop);

  // Click target indicator
  if (moveTarget) {
    const age = (Date.now() - moveTarget.time) / 1000;
    const alpha = Math.max(0, 0.5 - age * 0.15);
    const pulse = 1 + Math.sin(Date.now() / 200) * 0.15;
    ctx.strokeStyle = `rgba(226,183,20,${alpha})`; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(moveTarget.x, moveTarget.y, 8 * pulse, 0, Math.PI * 2); ctx.stroke();
    // Draw path dots
    if (movePath && alpha > 0.1) {
      ctx.fillStyle = `rgba(226,183,20,${alpha * 0.5})`;
      for (let i = movePathIdx; i < movePath.length; i++) {
        ctx.beginPath(); ctx.arc(movePath[i].x, movePath[i].y, 2, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  // Y-sorted drawables
  const drawables = [];
  for (const f of FURNITURE) { if (f.type === "rug") continue; drawables.push({ type: "f", data: f, sortY: f.y + f.h }); }
  drawables.push({ type: "p", data: localPlayer, isSelf: true, id: socket ? socket.id : "local", sortY: localPlayer.y + 28 });
  for (const [id, p] of remotePlayers) drawables.push({ type: "p", data: p, isSelf: false, id, sortY: p.y + 28 });
  drawables.sort((a, b) => a.sortY - b.sortY);

  const now = Date.now();
  const nearbyThrowables = throwMode ? getNearbyThrowables() : [];

  for (const d of drawables) {
    if (d.type === "f") {
      drawFurniture(ctx, d.data);
    } else {
      if (isPlayerFlying(d.id)) continue;

      const bob = d.data.isMoving ? Math.sin(now / 120) * 2 : 0;
      const stun = getStunScale(d.id);
      const wobble = getWobbleAngle(d.id);

      if (stun.scaleX !== 1 || stun.scaleY !== 1) {
        ctx.save();
        ctx.translate(d.data.x, d.data.y + 28);
        ctx.scale(stun.scaleX, stun.scaleY);
        ctx.translate(-d.data.x, -(d.data.y + 28));
        drawCharacter(ctx, d.data.x, d.data.y + stun.offsetY, d.data.character, d.data.direction, d.data.name, d.isSelf, 0);
        if (stun.scaleY < 0.8) {
          const sp = now / 200;
          ctx.font = "10px serif"; ctx.textAlign = "center";
          for (let s = 0; s < 3; s++) {
            ctx.fillText("⭐", d.data.x + Math.cos(sp + s*2.1)*16, d.data.y - 26 + Math.sin(sp*1.3 + s*1.5)*4);
          }
        }
        ctx.restore();
      } else if (wobble !== 0) {
        ctx.save();
        ctx.translate(d.data.x, d.data.y + 28);
        ctx.rotate(wobble);
        ctx.translate(-d.data.x, -(d.data.y + 28));
        drawCharacter(ctx, d.data.x, d.data.y, d.data.character, d.data.direction, d.data.name, d.isSelf, bob);
        ctx.restore();
      } else {
        drawCharacter(ctx, d.data.x, d.data.y, d.data.character, d.data.direction, d.data.name, d.isSelf, bob);
      }

      // Aura effect
      if (d.data.activeEmoji) drawAura(ctx, d.id, d.data.activeEmoji, d.data.x, d.data.y);

      // Speech bubble
      const bubble = chatBubbles.get(d.id);
      if (bubble && now - bubble.startTime < BUBBLE_DURATION) {
        const alpha = Math.min(1, 1 - (now - bubble.startTime - BUBBLE_DURATION + 1000) / 1000);
        ctx.save(); ctx.globalAlpha = Math.max(0, alpha);
        drawChatBubble(ctx, d.data.x, d.data.y + (bob || 0), bubble.text);
        ctx.restore();
      }

      // Interaction indicator (when near and not in throw mode)
      if (!d.isSelf && !throwMode && localPlayer) {
        const dx = d.data.x - localPlayer.x, dy = d.data.y - localPlayer.y;
        if (Math.sqrt(dx*dx + dy*dy) < INTERACT_RANGE && !isPlayerFlying(d.id) && !stunnedPlayers.has(d.id)) {
          const pulse = 0.4 + Math.sin(now / 300) * 0.3;
          ctx.font = "10px serif"; ctx.textAlign = "center"; ctx.globalAlpha = pulse;
          ctx.fillText("👆", d.data.x, d.data.y - 32);
          ctx.globalAlpha = 1;
        }
      }

      // Throw mode hover highlight
      if (throwMode && hoverTarget && hoverTarget.type === "player" && hoverTarget.id === d.id) {
        const pulse = 0.5 + Math.sin(now / 150) * 0.3;
        ctx.strokeStyle = `rgba(226,183,20,${pulse})`; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(d.data.x, d.data.y + 5, 22, 0, Math.PI * 2); ctx.stroke();
      }
    }
  }

  // Interaction indicators for throwable props
  if (localPlayer && !throwMode) {
    for (const prop of THROWABLE_PROPS) {
      const dx = prop.x - localPlayer.x, dy = prop.y - localPlayer.y;
      if (Math.sqrt(dx*dx + dy*dy) < INTERACT_RANGE) {
        const pulse = 0.3 + Math.sin(now / 300) * 0.2;
        ctx.font = "8px serif"; ctx.textAlign = "center"; ctx.globalAlpha = pulse;
        ctx.fillText("👆", prop.x, prop.y - 12);
        ctx.globalAlpha = 1;
      }
    }
  }

  // Throw mode: highlight nearby throwable props
  if (throwMode) {
    for (const item of nearbyThrowables) {
      if (item.type !== "prop") continue;
      const isHov = hoverTarget && hoverTarget.type === "prop" && hoverTarget.id === item.id;
      const pulse = isHov ? 0.7 + Math.sin(now / 150) * 0.3 : 0.3 + Math.sin(now / 300) * 0.2;
      ctx.strokeStyle = `rgba(226,183,20,${pulse})`; ctx.lineWidth = isHov ? 2 : 1;
      ctx.beginPath(); ctx.arc(item.data.x, item.data.y, 12, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // Flying players
  for (let i = flyingPlayers.length - 1; i >= 0; i--) {
    const obj = flyingPlayers[i];
    if (now - obj.startTime > THROW_FLY_DURATION) { flyingPlayers.splice(i, 1); continue; }
    drawFlyingPlayer(ctx, obj, now);
  }

  // Flying props
  for (const fp of flyingProps) {
    if (now - fp.startTime <= PROP_FLY_DURATION) drawFlyingPropItem(ctx, fp, now);
  }

  ctx.restore();
}

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
function gameLoop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  if (dt < 200) { handleInput(dt); update(dt); }
  render();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
//  CANVAS RESIZE
// ═══════════════════════════════════════════
function resizeCanvas() {
  const canvas = document.getElementById("game-canvas");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + "px"; canvas.style.height = rect.height + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr); ctx.imageSmoothingEnabled = false;
}
window.addEventListener("resize", () => { if (gameRunning) resizeCanvas(); });

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
setupEntryScreen();
</script>
</body>
</html>

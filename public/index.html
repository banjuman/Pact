<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pact - Virtual Office</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="entry-screen">
  <div class="entry-card">
    <h1>Pact</h1>
    <p class="subtitle">Virtual Office</p>
    <input id="name-input" type="text" placeholder="Enter your name" maxlength="20" autocomplete="off" />
    <p class="char-label">Choose your character</p>
    <div id="character-select"></div>
    <button id="join-btn">Join Office</button>
  </div>
</div>

<div id="top-bar">
  <div id="hud">
    <span id="hud-dot"></span>
    <span class="player-count" id="hud-players"></span>
  </div>
  <button id="exit-btn">✕ Exit</button>
</div>
<div id="main-content">
<div id="game-area">
  <canvas id="game-canvas"></canvas>
  <div id="emoji-bar">
    <button class="emoji-btn" data-emoji="😀">😀</button>
    <button class="emoji-btn" data-emoji="🔥">🔥</button>
    <button class="emoji-btn" data-emoji="❤️">❤️</button>
    <button class="emoji-btn" data-emoji="😢">😢</button>
    <button class="emoji-btn" data-emoji="⚡">⚡</button>
    <div id="throw-divider"></div>
    <button class="emoji-btn throw-disabled" id="throw-btn" title="Hover + T to throw">🤾</button>
    <button class="emoji-btn" id="vacuum-btn" title="Robot Vacuum (V)">🤖</button>
    <div id="status-divider"></div>
    <button class="emoji-btn" data-status="working" title="Working">🔨</button>
    <button class="emoji-btn" data-status="afk" title="AFK">☕</button>
    <button class="emoji-btn" data-status="oncall" title="On Call">📞</button>
    <button class="emoji-btn" data-status="gaming" title="Gaming">🎮</button>
    <button class="emoji-btn" data-status="lunch" title="Lunch">🍽️</button>
  </div>
</div>

<div id="chat-panel">
  <div id="chat-header"><span>Chat</span><div id="chat-header-btns"><button class="chat-hdr-btn" id="chat-popup-btn" title="Pop out chat">⧉</button></div></div>
  <div id="chat-messages"></div>
  <div id="chat-input-area">
    <input id="chat-input" type="text" placeholder="Type a message... (Enter)" maxlength="500" autocomplete="off" />
  </div>
</div>
</div>

<div id="overlay"><span id="overlay-text">Connecting...</span></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/map.js"></script>
<script src="/js/audio.js"></script>
<script src="/js/physics.js"></script>
<script src="/js/renderer.js"></script>
<script src="/js/mechanics.js"></script>
<script src="/js/chat.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/interaction.js"></script>
<script src="/js/social.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
